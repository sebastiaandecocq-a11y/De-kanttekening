name: Nieuws ophalen

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  haal-nieuws:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Nieuws ophalen en vertalen
        run: |
          python3 << 'PYTHON'
          import urllib.request
          import xml.etree.ElementTree as ET
          import json, re, time
          from datetime import datetime, timezone

          # Alleen open bronnen, geen betaalmuren
          FEEDS = [
            {"naam": "NOS",        "url": "https://feeds.nos.nl/nosnieuwsbuitenland", "nl": True},
            {"naam": "Al Jazeera", "url": "https://www.aljazeera.com/xml/rss/all.xml", "nl": False},
            {"naam": "AP News",    "url": "https://feeds.apnews.com/apnews/worldnews", "nl": False},
            {"naam": "Reuters",    "url": "https://feeds.reuters.com/reuters/worldNews", "nl": False},
            {"naam": "BBC World",  "url": "http://feeds.bbci.co.uk/news/world/rss.xml", "nl": False},
          ]

          BETAALMUUR = ['nrc.nl','volkskrant.nl','fd.nl','ft.com','nytimes.com','wsj.com','economist.com','bloomberg.com','telegraph.co.uk']

          TREFWOORDEN = ['war','conflict','military','troops','attack','missile','sanction','nato','ukraine','russia','gaza','israel','iran','china','taiwan','nuclear','coup','election','diplomat','treaty','summit','ceasefire','offensive','strike','bomb','refugee','peace','invasion','army','killed','oorlog','aanval','conflict','militair','sanctie','verkiezing','diplomatiek','vrede','invasie','raket']

          def is_betaalmuur(url):
            return any(d in url for d in BETAALMUUR)

          def regio(t, d):
            s = (t+' '+(d or '')).lower()
            if any(w in s for w in ['ukraine','oekraïne','rusland','russia','putin','kyiv','donbas']): return 'Oekraïne'
            if any(w in s for w in ['gaza','hamas','palestina','israel','netanyahu','hezbollah']): return 'Gaza/Israël'
            if any(w in s for w in ['iran','tehran']): return 'Iran'
            if any(w in s for w in ['china','taiwan','beijing','xi jinping']): return 'China/Taiwan'
            if any(w in s for w in ['north korea','noord-korea','kim jong']): return 'Noord-Korea'
            if any(w in s for w in ['usa','verenigde staten','washington','trump','pentagon']): return 'VS'
            if any(w in s for w in ['nato','navo','europa','european','brussel']): return 'Europa'
            if any(w in s for w in ['syrië','irak','libanon','saoedi','jemen','turkije']): return 'Midden-Oosten'
            if any(w in s for w in ['soedan','somalië','ethiopië','congo','mali']): return 'Afrika'
            return 'Wereld'

          def urgentie(t):
            t = t.lower()
            if any(w in t for w in ['gedood','aanval','raket','aanslag','coup','nucleair','invasie','killed','attack','missile','bomb','coup','nuclear','invasion']): return 'hoog'
            if any(w in t for w in ['militair','sanctie','staakt-het-vuren','top','verkiezing','military','sanction','ceasefire','summit','election']): return 'midden'
            return 'laag'

          def clean(s):
            if not s: return ''
            return re.sub(r'\s+',' ',re.sub(r'<[^>]+>','',s)).strip()[:400]

          def tijdgeleden(ds):
            try:
              from email.utils import parsedate_to_datetime
              diff = int((datetime.now(timezone.utc)-parsedate_to_datetime(ds)).total_seconds()/60)
              if diff < 60: return f'{diff} min geleden'
              if diff < 1440: return f'{diff//60} uur geleden'
              return f'{diff//1440} dagen geleden'
            except: return ''

          def vertaal(tekst):
            if not tekst: return ''
            try:
              data = json.dumps({"q": tekst, "source": "en", "target": "nl"}).encode()
              req = urllib.request.Request(
                'https://libretranslate.com/translate',
                data=data,
                headers={'Content-Type': 'application/json'},
              )
              with urllib.request.urlopen(req, timeout=8) as r:
                result = json.loads(r.read())
                return result.get('translatedText', tekst)
            except:
              return tekst

          artikelen = []
          headers = {'User-Agent': 'Mozilla/5.0 (compatible; Kanttekening/1.0)'}

          for feed in FEEDS:
            try:
              req = urllib.request.Request(feed['url'], headers=headers)
              with urllib.request.urlopen(req, timeout=12) as r:
                content = r.read()
              root = ET.fromstring(content)
              items = root.findall('.//item')

              for item in items[:10]:
                titel = clean(item.findtext('title') or '')
                desc  = clean(item.findtext('description') or '')
                url   = (item.findtext('link') or '').strip()
                datum = item.findtext('pubDate') or ''

                if not titel: continue
                if is_betaalmuur(url): continue
                if not feed['nl'] and not any(w in (titel+' '+desc).lower() for w in TREFWOORDEN): continue

                # Vertaal als niet Nederlands
                if not feed['nl']:
                  titel = vertaal(titel)
                  desc  = vertaal(desc)
                  time.sleep(0.5)

                artikelen.append({
                  'titel': titel,
                  'beschrijving': desc,
                  'url': url,
                  'datum': tijdgeleden(datum),
                  'regio': regio(titel, desc),
                  'urgentie': urgentie(titel),
                  'bron': feed['naam'],
                })
            except Exception as e:
              print(f"Fout {feed['naam']}: {e}")

          # Sorteer op urgentie
          volgorde = {'hoog':0,'midden':1,'laag':2}
          artikelen.sort(key=lambda a: volgorde.get(a['urgentie'], 2))

          # Verwijder duplicaten
          gezien, uniek = [], []
          for a in artikelen:
            woorden = set(a['titel'].lower().split())
            if not any(len(woorden & g)/max(len(woorden),1) > 0.6 for g in gezien):
              gezien.append(woorden)
              uniek.append(a)

          output = {
            'bijgewerkt': datetime.now(timezone.utc).strftime('%d %b %Y %H:%M UTC'),
            'artikelen': uniek[:20],
            'ticker': [a['titel'] for a in uniek[:10]]
          }

          with open('nieuws.json', 'w', encoding='utf-8') as f:
            json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(uniek)} artikelen opgeslagen")
          PYTHON

      - name: Commit nieuws.json
        run: |
          git config user.name "Kanttekening Bot"
          git config user.email "bot@kanttekening.nl"
          git add nieuws.json
          git diff --staged --quiet || git commit -m "📰 Nieuws $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
